<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WHC – Project Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap"/>
<link rel="stylesheet" href="../shared/style.css"/>
<button class="scroll-top-btn" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div><div style="font-size:13px;color:#888">Loading your project...</div></div></div>

<script src="../shared/config.js"></script>
<script src="../shared/shared.js"></script>
<script>
const PROJECT_ID = new URLSearchParams(window.location.search).get("id");

// ── Client view with stale-while-revalidate local cache ───────
// The client link is the most-viewed page. To minimise Firebase
// downloads and make it feel instant, we cache the project in the
// browser (localStorage). On open: paint the cached copy immediately
// (0 network), then fetch the latest in the background and refresh
// the view only if something changed. A short freshness window skips
// the network entirely on rapid refreshes.
const _CACHE_KEY = "whc_client_" + (PROJECT_ID || "");
const _FRESH_MS = 60000; // 60s: within this, don't even re-fetch

function _readCache() {
  try { const raw = localStorage.getItem(_CACHE_KEY); return raw ? JSON.parse(raw) : null; }
  catch (e) { return null; }
}
function _writeCache(data) {
  try { localStorage.setItem(_CACHE_KEY, JSON.stringify({ at: Date.now(), data })); } catch (e) {}
}

async function boot() {
  if (!PROJECT_ID) {
    document.getElementById("app").innerHTML = notFoundPage("No project ID provided in the link.");
    return;
  }

  // 1) Instant paint from cache, if present.
  const cached = _readCache();
  let painted = false, paintedJson = "";
  if (cached && cached.data) {
    paintedJson = JSON.stringify(cached.data);
    renderClient(migrateProject(cached.data));
    painted = true;
    // Fresh enough → skip the network completely.
    if (Date.now() - (cached.at || 0) < _FRESH_MS) return;
  }

  // 2) Revalidate in the background (or foreground if nothing cached).
  let data = null;
  try {
    // Bypass the in-memory TTL cache; we manage freshness ourselves.
    data = await fbGet("projects/" + PROJECT_ID, { fresh: true });
  } catch (e) { data = null; }

  if (!data) {
    // Network failed but we already showed cached content → keep it.
    if (painted) return;
    document.getElementById("app").innerHTML = notFoundPage("This link may be invalid or the project was deleted.");
    return;
  }

  _writeCache(data);
  // Only re-render if the data actually changed (avoids a flicker).
  if (!painted || JSON.stringify(data) !== paintedJson) {
    renderClient(migrateProject(data));
  }
}

function notFoundPage(msg) {
  return `<div style="padding:60px 20px;text-align:center">
    <div style="font-size:40px;margin-bottom:12px">🔍</div>
    <div style="font-size:16px;font-weight:600;color:#333;margin-bottom:6px">Project Not Found</div>
    <div style="font-size:13px;color:#888">${esc(msg)}</div>
  </div>`;
}

let _tab = "stages";

function renderClient(d) {
  const fb = natureArr(d.project.unitType).includes("F&B");
  const stages = d.stages || [];
  const doneCount = stages.filter(s => isStageComplete(s)).length;
  const pct = Math.round(doneCount / Math.max(stages.length, 1) * 100);
  const currentStage = stages.find(s => {
    const sv = s.status || "";
    return sv && !["received","approved","completed","completed-signed","approved-bcc"].includes(sv);
  });
  const allDone = doneCount === stages.length && stages.length > 0;
  const prop = d.proposal || {}, reapps = prop.reapprovals || [], ptypes = prop.projectTypes || [];
  const hasScope = prop.scopeHtml || reapps.length > 0;

  function switchTab(tab) {
    _tab = tab;
    document.querySelectorAll(".tab").forEach(el => el.classList.remove("on"));
    document.getElementById("tab-" + tab)?.classList.add("on");
    document.getElementById("panel-stages").style.display  = tab === "stages" ? "" : "none";
    document.getElementById("panel-docs").style.display    = tab === "docs"   ? "" : "none";
    if (hasScope) document.getElementById("panel-scope").style.display = tab === "scope" ? "" : "none";
  }

  let html = `
  <div class="hdr">
    <div class="hdr-logo">Winner Holistic Consultants</div>
    <div class="hdr-title">${esc(d.project.title || "Project")}</div>
    <div class="hdr-sub">${esc(d.project.location || "")}</div>
    <div class="pills">
      <div class="pill">Client: ${esc(d.project.client || "—")}</div>
      <div class="pill">Unit: ${esc(d.project.unit || "—")}</div>
      <div class="pill">Coordinator: ${esc(d.project.coordinator || "—")}</div>
      <div class="pill ${fb ? "pill-fb" : ""}">${fb ? "F&amp;B Unit – Gas Approval Included" : esc(natureDisplay(d.project.unitType))}</div>
    </div>
    <div class="pbar-row"><span>Overall Approval Progress</span><span>${pct}% Complete</span></div>
    <div class="pbar-bg"><div class="pbar-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="topbar">
    <span style="font-size:12px;color:#888">${doneCount} of ${stages.length} stages completed</span>
  </div>
  <div class="tabs">
    <div class="tab on" id="tab-stages" onclick="switchTab('stages')">Approval Stages</div>
    <div class="tab" id="tab-docs" onclick="switchTab('docs')">Documents</div>
    ${hasScope ? `<div class="tab" id="tab-scope" onclick="switchTab('scope')">Scope of Work</div>` : ""}
  </div>
  <div class="body">

  <!-- ── Stages panel ── -->
  <div id="panel-stages">
    <div class="milestone-label" ${allDone ? 'style="border-color:#a3d4b8;background:#f0fdf4"' : ''}>
      <div class="milestone-icon">${allDone ? "🎉" : currentStage ? "📍" : "🕐"}</div>
      <div class="milestone-text">
        <div class="milestone-title" ${allDone ? 'style="color:#166a3f"' : ''}>Current Milestone</div>
        <div class="milestone-value" ${allDone ? 'style="color:#166a3f"' : ''}>
          ${allDone ? "Project Fully Completed ✓" : currentStage ? esc(currentStage.name) : "Awaiting First Stage Update"}
        </div>
        ${currentStage && currentStage.note ? `<div class="milestone-note">${esc(currentStage.note)}</div>` : ""}
      </div>
      ${currentStage ? `<span class="badge ${(STATUS_DISPLAY[currentStage.status || ""] || STATUS_DISPLAY[""]).cls}">${(STATUS_DISPLAY[currentStage.status || ""] || STATUS_DISPLAY[""]).label}</span>` : ""}
    </div>
    ${stages.map((st, i) => {
      const last = i === stages.length - 1;
      const type = st.type || "scope";
      const disp = STATUS_DISPLAY[st.status || ""] || STATUS_DISPLAY[""];
      const needsApp = needsAppNum(type, st.status || "");
      const hasDate  = hasDateFields(type);
      return `<div class="sw">
        <div class="sl">
          <div class="si ${stageCls(st)}">${stageIcon(st)}</div>
          ${!last ? `<div class="sline ${isStageComplete(st) ? "sline-done" : ""}"></div>` : ""}
        </div>
        <div class="sr">
          <div class="sname">${esc(st.name)}</div>
          ${st.time ? `<div class="stime">⏱ ${esc(st.time)}</div>` : ""}
          <div class="badge ${disp.cls}">${disp.label}</div>
          ${needsApp && st.appNum ? `<div class="s-appnum">📋 Application No: <strong>${esc(st.appNum)}</strong></div>` : ""}
          ${hasDate && st.dateA ? `<div class="s-date">📅 ${dateLabelA(type)}: <strong>${fmtDate(st.dateA)}</strong></div>` : ""}
          ${hasDate && st.dateB ? `<div class="s-date">✅ ${dateLabelB(type)}: <strong>${fmtDate(st.dateB)}</strong></div>` : ""}
          ${st.note ? `<div class="snote">${esc(st.note)}</div>` : ""}
        </div>
      </div>`;
    }).join("")}
  </div>

  <!-- ── Documents panel ── -->
  <div id="panel-docs" style="display:none">
    ${fb ? `<div class="nb nb-fb">This is an F&amp;B unit. Gas approval documents are included below.</div>`
          : `<div class="nb">Documents marked <strong>Required</strong> must be submitted before the relevant stage can proceed.</div>`}
    ${d.docs.filter(g => !g.fb || fb).map(g => `
      <div class="dc">
        <div class="dch ${g.fb ? "dch-fb" : ""}">${esc(g.group)}
          ${g.fb ? `<span style="font-size:9px;background:#fde8d8;color:#a04800;padding:1px 7px;border-radius:8px;font-weight:700;margin-left:6px">F&amp;B/Gas</span>` : ""}
        </div>
        ${g.items.map(item => `<div class="dr">
          <div class="dic ${dIc(item.status)}">${dCh(item.status)}</div>
          <span>${esc(item.name)}</span>
          ${dTag(item.status)}
        </div>`).join("")}
      </div>`).join("")}
  </div>

  <!-- ── Scope panel ── -->
  ${hasScope ? `<div id="panel-scope" style="display:none">
    <div class="sbox">
      <div class="sbox-title">Scope of Work</div>
      ${ptypes.length ? `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">${ptypes.map(t => `<span class="proj-type-tag">${esc(t)}</span>`).join("")}</div>` : ""}
      <div style="font-size:13px;color:#222;line-height:1.8">${prop.scopeHtml || "<span style='color:#aaa'>Scope not yet entered.</span>"}</div>
      ${prop.quotationNumber ? `<div style="margin-top:12px;padding-top:10px;border-top:1px solid #f0f0f0;font-size:12px;color:#666">Quotation Reference: <strong>${esc(prop.quotationNumber)}</strong></div>` : ""}
      ${prop.expectedStartDate ? `<div style="font-size:12px;color:#666;margin-top:4px">Expected Start: <strong>${fmtDate(prop.expectedStartDate)}</strong></div>` : ""}
    </div>
    ${reapps.length ? `<div style="margin-bottom:10px">
      <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#a04800;font-weight:700;margin-bottom:8px">🔄 Re-approval Quotations</div>
      ${reapps.map((r, ri) => `<div class="reapp-client-box">
        <div class="reapp-client-hdr">🔄 Re-approval ${ri + 1}${r.title ? " — " + esc(r.title) : ""}
          ${r.quotationNumber ? `<span style="margin-left:auto;font-size:10px;background:#fff;color:#a04800;padding:1px 7px;border-radius:8px;border:1px solid #e8a060">${esc(r.quotationNumber)}</span>` : ""}
        </div>
        <div class="reapp-client-body">
          ${r.scopeHtml ? `<div style="font-size:12px;color:#333;line-height:1.7">${r.scopeHtml}</div>` : "<div style='font-size:12px;color:#aaa'>Scope not yet entered.</div>"}
        </div>
      </div>`).join("")}
    </div>` : ""}
  </div>` : ""}

  </div><!-- end .body -->
  <div class="footer">Winner Holistic Consultants &nbsp;·&nbsp; Abu Dhabi MEPS Portal & Overall Project Management &nbsp;·&nbsp; All information subject to authority requirements</div>`;

  document.getElementById("app").innerHTML = html;
}

// ── Helper stubs for client view ──────────────────────────────
function needsAppNum(type, status) {
  if (type === "registration" && status === "submitted") return true;
  if (type === "approval_meps" && status === "under-review-meps") return true;
  if ((type === "approval_portal" || type === "inspection") && status === "under-review-portal") return true;
  if (type === "gis" && status === "submitted-meps") return true;
  return false;
}
function hasDateFields(type) { return !["scope","site_work","completed"].includes(type); }
function dateLabelA(type) { return type === "drawing_prep" ? "Drawing/Document Received" : "Submission Date"; }
function dateLabelB(type) { return type === "drawing_prep" ? "Document/Drawing Completed" : "Approved Date"; }

boot();
</script>
</body>
</html>
