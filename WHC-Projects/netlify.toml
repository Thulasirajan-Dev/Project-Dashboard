# Winner Holistic Consultants – Netlify Configuration
# Each module is a separate folder, all share the same Firebase backend

[build]
  publish = "."

# ── Root landing page ─────────────────────────────────────────
[[redirects]]
  from = "/"
  to   = "/auth/index.html"
  status = 200

# ── Module routes (bare path → that module's index.html) ──────
# NOTE: Do NOT add "/module/*" → "/module/:splat" rewrites.
# Netlify already serves static files (JS/CSS/images) inside each
# folder directly. A wildcard self-rewrite shadows those real files
# and makes them return HTML (404 page) instead of the asset,
# which breaks <script src> with a MIME-type error.
[[redirects]]
  from = "/auth"
  to   = "/auth/index.html"
  status = 200

[[redirects]]
  from = "/proposals"
  to   = "/proposals/index.html"
  status = 200

[[redirects]]
  from = "/coordinator"
  to   = "/coordinator/index.html"
  status = 200

[[redirects]]
  from = "/account"
  to   = "/account/index.html"
  status = 200

[[redirects]]
  from = "/summary"
  to   = "/summary/index.html"
  status = 200

[[redirects]]
  from = "/client"
  to   = "/client/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
