# Winner Holistic Consultants – Netlify Configuration
# Each module is a separate folder, all share the same Firebase backend

[build]
  publish = "."

# ── Module routes ─────────────────────────────────────────────
[[redirects]]
  from = "/auth"
  to   = "/auth/index.html"
  status = 200

[[redirects]]
  from = "/auth/*"
  to   = "/auth/:splat"
  status = 200

[[redirects]]
  from = "/proposals"
  to   = "/proposals/index.html"
  status = 200

[[redirects]]
  from = "/proposals/*"
  to   = "/proposals/:splat"
  status = 200

[[redirects]]
  from = "/coordinator"
  to   = "/coordinator/index.html"
  status = 200

[[redirects]]
  from = "/coordinator/*"
  to   = "/coordinator/:splat"
  status = 200

[[redirects]]
  from = "/account"
  to   = "/account/index.html"
  status = 200

[[redirects]]
  from = "/account/*"
  to   = "/account/:splat"
  status = 200

[[redirects]]
  from = "/summary"
  to   = "/summary/index.html"
  status = 200

[[redirects]]
  from = "/summary/*"
  to   = "/summary/:splat"
  status = 200

[[redirects]]
  from = "/client"
  to   = "/client/index.html"
  status = 200

[[redirects]]
  from = "/client/*"
  to   = "/client/:splat"
  status = 200

# ── Security headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
