<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script>
// Apply saved theme/accent/density BEFORE the stylesheet paints, so there's
// no flash of the wrong theme on load. Deliberately tiny and dependency-free
// (shared.js hasn't loaded yet) — mirrors applyThemePrefs() in shared.js.
(function(){
  try{
    var t=localStorage.getItem("whc_theme"), a=localStorage.getItem("whc_accent"), d=localStorage.getItem("whc_density");
    if(t==="dark") document.documentElement.setAttribute("data-theme","dark");
    if(a && a!=="default") document.documentElement.setAttribute("data-accent",a);
    if(d==="compact") document.documentElement.setAttribute("data-density","compact");
  }catch(e){}
})();
</script>
<title>WHC – Templates</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<script>
let S = { tplTab: "scope", search: "", expanded: {}, _tplEdit: null };
async function boot() {
  CURRENT_USER = requireModule("templates");
  if (!CURRENT_USER) return;
  await loadRbacOverrides();
  window.WHC_VIEW_ONLY = isViewOnly("templates", CURRENT_USER.role);
  mountSidebar("templates");
  if (window.WHC_VIEW_ONLY) applyViewOnlyMode("Templates");
  mountViewToggle();
  await loadAndRenderTemplates();
}
boot();
