<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script>
// Apply saved theme/accent/density BEFORE the stylesheet paints, so there's
// no flash of the wrong theme on load. Deliberately tiny and dependency-free
// (shared.js hasn't loaded yet) — mirrors applyThemePrefs() in shared.js.
(function(){
  try{
    var t=localStorage.getItem("whc_theme"), a=localStorage.getItem("whc_accent"), d=localStorage.getItem("whc_density");
    if(t==="dark") document.documentElement.setAttribute("data-theme","dark");
    if(a && a!=="default") document.documentElement.setAttribute("data-accent",a);
    if(d==="compact") document.documentElement.setAttribute("data-density","compact");
  }catch(e){}
})();
</script>
<title>WHC – Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap"/>
<link rel="stylesheet" href="../shared/style.css?v=20260714i"/>
<style>
/* auth full width */
#app{max-width:none!important}

/* ── Portal hub ── */
.portal-top{background:linear-gradient(160deg,var(--sun1) 0%,var(--sun2) 60%,var(--sun3) 120%);padding:18px 22px;color:#fff;display:flex;justify-content:space-between;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.1)}
.portal-top .who{text-align:right;flex-shrink:0}
.portal-brand{font-size:13px;letter-spacing:2px;color:#fff;text-transform:uppercase;font-weight:600}
.portal-sub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px}
.portal-wrap{max-width:1100px;margin:0 auto;padding:26px 26px 60px;background:var(--bg)}
.portal-greet{font-family:'Poppins','DM Sans',sans-serif;font-size:22px;color:var(--text);margin-bottom:4px}
.portal-greet-sub{font-size:12px;color:var(--text-muted);margin-bottom:22px}
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.tile{position:relative;background:linear-gradient(160deg,var(--surface) 0%,var(--surface-2) 100%);border:1px solid var(--border);border-radius:16px;padding:22px 18px;text-decoration:none;color:inherit;display:block;transition:transform 0.22s cubic-bezier(.2,.8,.2,1),box-shadow 0.22s,border-color 0.22s;overflow:hidden;box-shadow:var(--shadow-card);transform:perspective(800px) translateZ(0)}
.tile.on{cursor:pointer}
.tile.on::after{content:'';position:absolute;inset:0;border-radius:16px;background:radial-gradient(140px 90px at 78% 6%,rgba(0,0,0,0.08),transparent 70%);pointer-events:none;opacity:0;transition:opacity 0.22s}
.tile.on:hover{transform:perspective(800px) translateY(-6px) rotateX(4deg) scale(1.015);box-shadow:0 2px 2px rgba(13,33,55,0.05),0 14px 24px rgba(13,33,55,0.14),0 26px 48px rgba(13,33,55,0.12),0 0 0 1px var(--sun2);border-color:var(--sun2)}
.tile.on:hover::after{opacity:1}
.tile.on:active{transform:perspective(800px) translateY(-2px) scale(1.0);transition:transform 0.08s}
.tile.locked{opacity:0.55;cursor:not-allowed;background:var(--surface-2);box-shadow:inset 0 1px 2px rgba(13,33,55,0.05);border-style:dashed;transform:none}
.tile-ico{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:13px;background:linear-gradient(145deg,var(--surface),var(--surface-3));box-shadow:0 2px 5px rgba(13,33,55,0.12),inset 0 1px 0 rgba(255,255,255,0.5),inset 0 -2px 4px rgba(13,33,55,0.06)}
.tile-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:7px}
.tile-desc{font-size:11.5px;color:var(--text-muted);margin-top:4px;line-height:1.5}
.tile-lock{position:absolute;top:14px;right:14px;font-size:13px;color:var(--text-faint)}
.tile-go{margin-top:14px;font-size:11px;font-weight:600;color:var(--sun1);letter-spacing:0.3px}
.tile.locked .tile-go{color:var(--text-faint)}
.role-pill{display:inline-block;margin-top:2px;font-size:11px;font-weight:600;padding:2px 11px;border-radius:10px}

/* ── Login / first-page — same accent variables as the sidebar/hub ── */
body{background:var(--bg)}
.login-wrap{background:linear-gradient(180deg,var(--bg) 0%,var(--surface-2) 100%)}

/* Company selector on login */
.co-select{display:flex;flex-direction:column;gap:8px}
.co-opt{display:flex;flex-direction:column;align-items:flex-start;gap:1px;text-align:left;
  padding:11px 14px;border:2px solid var(--border);border-radius:11px;background:var(--surface);cursor:pointer;
  transition:all 0.14s;font-family:inherit;width:100%}
.co-opt:hover{border-color:var(--co-accent)}
.co-opt.on{border-color:var(--co-accent);background:var(--surface-2);
  box-shadow:0 3px 12px rgba(0,0,0,0.08)}
.co-opt-name{font-size:14px;font-weight:700;color:var(--text)}
.co-opt-full{font-size:11px;color:var(--text-muted)}
.co-opt.on .co-opt-name{color:var(--co-accent)}
</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div><div style="font-size:13px;color:#888">Loading...</div></div></div>

<script src="../shared/config.js?v=20260714i"></script>
<script src="../shared/permissions.js?v=20260714i"></script>
<script src="../shared/shared.js?v=20260714i"></script>
<script src="auth.js?v=20260714i"></script>
<script>
// ============================================================
//  WHC Portal hub
//  - Logs the user in once (or bootstraps the first admin)
//  - Shows every module as a tile; permitted ones are clickable,
//    the rest are greyed out and locked based on the user's role.
//  - Super admins also get a "Manage Users" button (auth.js view).
// ============================================================

// Role arrays come from MODULE_ACCESS in shared/permissions.js (single
// source of truth) — this hub just adds titles/icons/descriptions.
const MODULES = [
  { key:"proposals",   url:"/proposals/",   icon:"📝", title:"Proposals",   desc:"Create & manage quotations",     allow: MODULE_ACCESS.proposals },
  { key:"coordinator", url:"/coordinator/", icon:"📋", title:"Coordinator", desc:"Assigned projects & tracking",    allow: MODULE_ACCESS.coordinator },
  { key:"account",     url:"/account/",     icon:"⚙️", title:"Account",     desc:"Projects & milestone tracking",  allow: MODULE_ACCESS.account },
];
// Second row: Milestone + Overall Summary + Templates.
const MODULES_ROW2 = [
  { key:"payments",    url:"/payments/",    icon:"📊", title:"Milestone",  desc:"Project-wise milestone collections & pending", allow: MODULE_ACCESS.payments },
  { key:"summary",     url:"/summary/",     icon:"📊", title:"Overall Summary",     desc:"Dashboard & overview",            allow: MODULE_ACCESS.summary },
  { key:"templates",   url:"/templates/",   icon:"🧩", title:"Templates",  desc:"Browse & manage Scope and Approval Stage templates", allow: MODULE_ACCESS.templates },
  { key:"team_performance", url:"/team-performance/", icon:"🏆", title:"Team Performance", desc:"Proposals, Coordinator & Account leaderboards", allow: MODULE_ACCESS.team_performance },
  // NOTE: The Client page (/client/?id=xxx) is intentionally a PUBLIC,
  // per-project link sent to external customers — it has no login by
  // design. It is not listed here because there is nothing to "browse":
  // opening /client/ without a project id shows an empty page. Staff
  // generate client links from inside the Proposals / Coordinator modules.
];

const ROLE_LABEL = {
  super_admin: { label:"Super Admin", style:"background:#FAECE7;color:#712B13" },
  proposals:   { label:"Proposals",   style:"background:#EEEDFE;color:#3C3489" },
  team_lead:   { label:"Team Lead",   style:"background:#E7F1FD;color:#1A4E8A" },
  coordinator: { label:"Coordinator", style:"background:#FAEEDA;color:#633806" },
};

function canAccess(user, mod){ return user && mod.allow.includes(user.role); }

// ── Boot ──────────────────────────────────────────────────────
async function boot() {
  mountViewToggle();
  // Verify the session with the SERVER (cookie), not just local storage.
  let session = getSession();
  try {
    const res = await fetch("/api/auth.php", {
      method: "POST", headers: { "Content-Type": "application/json" },
      credentials: "include", body: JSON.stringify({ action: "me" })
    });
    const data = await res.json();
    if (data && data.user) {
      setSession(data.user);
      await loadRbacOverrides();
      renderHub(data.user);
      return;
    }
  } catch (e) {}

  // No valid server session → show the login screen, with a clear reason
  // if we landed here because of a timeout or a login elsewhere.
  const params = new URLSearchParams(window.location.search);
  let msg = "";
  if (params.get("session_replaced") === "1") msg = "You've been signed out because this account signed in on another device or browser.";
  else if (params.get("timeout") === "1") msg = "You've been signed out due to inactivity.";
  renderLoginPage(msg);
}

// ── The hub (after login) ─────────────────────────────────────
function renderHub(user) {
  const roleMeta = ROLE_LABEL[user.role] || { label:user.role, style:"background:#f0f0f0;color:#555" };

  const renderTile = mod => {
    const ok = canAccess(user, mod);
    if (ok) {
      return `<a class="tile on" href="${mod.url}">
        <div class="tile-ico">${mod.icon}</div>
        <div class="tile-title">${mod.title}</div>
        <div class="tile-desc">${mod.desc}</div>
        <div class="tile-go">Open →</div>
      </a>`;
    }
    return `<div class="tile locked" title="You don't have access to this module">
      <span class="tile-lock">🔒</span>
      <div class="tile-ico">${mod.icon}</div>
      <div class="tile-title">${mod.title}</div>
      <div class="tile-desc">${mod.desc}</div>
      <div class="tile-go">Locked</div>
    </div>`;
  };
  const tiles = MODULES.map(renderTile).join("");
  const tilesRow2 = MODULES_ROW2.map(renderTile).join("");

  const manageBtn = user.role === "super_admin"
    ? `<button class="btn btn-out" style="font-size:11px" onclick="loadUsers()">Manage Users</button>` : "";
  const activityBtn = user.role === "super_admin"
    ? `<button class="btn btn-out" style="font-size:11px" onclick="openActivityLog()">🕘 Activity Log</button>` : "";

  document.getElementById("app").innerHTML = `
  <div class="portal-top">
    <div>
      <div class="portal-brand">Winner Holistic Consultants</div>
      <div class="portal-sub">Project Portal</div>
    </div>
    <div class="who">
      <div style="font-size:11px;color:rgba(255,255,255,0.5)">Signed in as</div>
      <div style="font-size:13px;font-weight:600;color:#fff">${esc(user.name || "User")}</div>
      <span class="role-pill" style="${roleMeta.style}">${roleMeta.label}</span>
    </div>
  </div>
  <div class="portal-wrap">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;gap:10px;flex-wrap:wrap">
      <div>
        <div class="portal-greet">Welcome${user.name ? ", " + esc(user.name.split(" ")[0]) : ""}</div>
        <div class="portal-greet-sub">Choose a module below. Locked tiles are outside your access.</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;position:relative">
        <button class="btn" style="font-size:11px;background:#0d2137;color:#fff" onclick="toggleThemePanel()">🎨 Appearance</button>
        <div id="whc-theme-panel" style="display:none;position:absolute;top:36px;right:0;z-index:500;width:230px;background:#0d2137;border-radius:12px;padding:14px;box-shadow:0 12px 30px rgba(0,0,0,0.25)"></div>
        ${manageBtn}
        ${activityBtn}
        <button class="btn" style="font-size:11px;background:#eef0ff;color:#5b3df5" onclick="openChangePin()">Change PIN</button>
        <button class="btn btn-red" style="font-size:11px" onclick="serverLogout().then(()=>window.location.reload())">Logout</button>
      </div>
    </div>
    <div class="tile-grid">${tiles}</div>
    <div class="tile-grid" style="margin-top:16px">${tilesRow2}</div>
    <div id="change-pin-modal"></div>
  </div>`;
  if (typeof applyThemePrefs === "function") applyThemePrefs();
  if (typeof renderThemePanel === "function") renderThemePanel();
}

// Change-PIN modal (self-service, verifies current PIN).
function openChangePin() {
  const host = document.getElementById("change-pin-modal");
  if (!host) return;
  host.innerHTML = `
    <div style="position:fixed;inset:0;background:rgba(20,20,40,.45);display:flex;align-items:center;justify-content:center;z-index:100" onclick="if(event.target===this)closeChangePin()">
      <div style="background:#fff;border-radius:14px;padding:22px;width:min(380px,92vw);box-shadow:0 20px 60px rgba(0,0,0,.25)">
        <div style="font-size:16px;font-weight:700;color:#1a2740;margin-bottom:14px">Change your PIN</div>
        <div style="margin-bottom:10px"><div style="font-size:12px;color:#666;margin-bottom:4px">Current PIN</div>
          <input id="cp-current" type="password" inputmode="numeric" class="fi" style="width:100%" placeholder="Current PIN"/></div>
        <div style="margin-bottom:10px"><div style="font-size:12px;color:#666;margin-bottom:4px">New PIN (min 4 chars)</div>
          <input id="cp-new" type="password" inputmode="numeric" class="fi" style="width:100%" placeholder="New PIN"/></div>
        <div style="margin-bottom:14px"><div style="font-size:12px;color:#666;margin-bottom:4px">Confirm New PIN</div>
          <input id="cp-confirm" type="password" inputmode="numeric" class="fi" style="width:100%" placeholder="Re-enter new PIN"/></div>
        <div id="cp-msg" style="font-size:12px;min-height:16px;margin-bottom:10px"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn" style="background:#eee;color:#333" onclick="closeChangePin()">Cancel</button>
          <button class="btn btn-purple" onclick="submitChangePin()">Update PIN</button>
        </div>
      </div>
    </div>`;
}
function closeChangePin() {
  const host = document.getElementById("change-pin-modal");
  if (host) host.innerHTML = "";
}
async function submitChangePin() {
  const cur = document.getElementById("cp-current").value.trim();
  const nw  = document.getElementById("cp-new").value.trim();
  const cf  = document.getElementById("cp-confirm").value.trim();
  const msg = document.getElementById("cp-msg");
  const show = (t, ok) => { msg.textContent = t; msg.style.color = ok ? "#0f7a52" : "#c0392b"; };
  if (!cur || !nw || !cf) return show("All fields are required.", false);
  if (nw.length < 4) return show("New PIN must be at least 4 characters.", false);
  if (nw !== cf) return show("New PIN and confirmation do not match.", false);
  if (nw === cur) return show("New PIN must be different from the current one.", false);
  show("Updating…", true);
  const r = await changePin(cur, nw);
  if (r.ok) { show("✓ PIN updated successfully.", true); setTimeout(closeChangePin, 1200); }
  else show(r.error || "Could not change PIN.", false);
}

// (First-time bootstrap removed — the first Super Admin is created once
//  directly in the database via SQL. See the install guide.)

// ── Login page ────────────────────────────────────────────────
function renderLoginPage(errMsg) {
  const sel = (typeof getCompany==="function") ? getCompany().id : "whc";
  document.getElementById("app").innerHTML = `
  <div class="landing-hero">
    <div class="landing-brand">Winner Group</div>
    <div class="landing-title">Team Login</div>
    <div class="landing-sub">Select your company, then enter your email and PIN</div>
  </div>
  <div class="login-wrap" style="padding-top:28px"><div class="login-box">
    ${errMsg ? `<div class="err-msg">${esc(errMsg)}</div>` : ""}
    <div class="fl" style="margin-bottom:6px">Company</div>
    <select class="fi" id="lg-company" style="margin-bottom:14px" onchange="pickCompany(this.value)">
      ${COMPANIES.map(c => `<option value="${c.id}" ${c.id===sel?"selected":""}>${esc(c.name)}</option>`).join("")}
    </select>
    <div class="fl" style="margin-bottom:6px">Email</div>
    <input class="fi" id="lg-email" type="email" placeholder="your.name@winnerhc.com" style="margin-bottom:10px"
      autocomplete="username"/>
    <div class="fl" style="margin-bottom:6px">PIN</div>
    <input class="fi" id="lg-pin" type="password" placeholder="Your PIN" style="margin-bottom:16px"
      autocomplete="current-password" onkeydown="if(event.key==='Enter')submitLogin()"/>
    <button class="btn btn-gold" style="width:100%;padding:11px;font-size:13px" onclick="submitLogin()">
      Login ${svgIcon('arrow-right',14,'#fff')}
    </button>
    <div style="text-align:center;margin-top:14px;font-size:11px;color:#aaa">
      Forgot your PIN? Contact your Super Admin.
    </div>
  </div></div>`;
}

function pickCompany(id) {
  setCompany(id);
}

async function submitLogin() {
  const email = document.getElementById("lg-email")?.value.trim() || "";
  const pin = document.getElementById("lg-pin")?.value.trim() || "";
  // Lock in whichever company the dropdown currently shows.
  const co = document.getElementById("lg-company")?.value;
  if (co) setCompany(co);
  if (!email || !pin) { renderLoginPage("Please enter your email and PIN."); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { renderLoginPage("Enter a valid email address."); return; }

  document.getElementById("app").innerHTML = `<div class="loading"><div class="spinner"></div><div style="font-size:13px;color:#888">Verifying...</div></div>`;

  const user = await loginWithPin(email, pin);
  if (!user) { renderLoginPage("Incorrect email or PIN. Please try again."); return; }

  // Everyone lands on the hub; tiles unlock based on role.
  renderHub(user);
}

boot();
</script>
</body>
</html>
