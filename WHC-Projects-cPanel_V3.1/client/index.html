<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WHC – Project Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap"/>
<style>
  :root{--ink:#1a2740;--muted:#6b7280;--line:#e6e8ef;--gold:#c9a752;--navy:#1a3a5c;
        --done:#1d9e75;--prog:#e0a000;--todo:#9aa0aa;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'DM Sans',system-ui,sans-serif;background:#f5f6fa;color:var(--ink)}
  .wrap{max-width:640px;margin:0 auto;min-height:100vh;background:#fff}
  .hdr{background:linear-gradient(135deg,#1a3a5c,#24507e);color:#fff;padding:30px 24px 26px}
  .brand{font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;letter-spacing:.5px;opacity:.85}
  .ptitle{font-family:'Poppins',sans-serif;font-size:22px;font-weight:600;margin:8px 0 2px}
  .pclient{font-size:13px;opacity:.85}
  .pbar-row{display:flex;justify-content:space-between;font-size:12px;margin:20px 0 6px;opacity:.95}
  .pbar-bg{height:9px;background:rgba(255,255,255,.22);border-radius:6px;overflow:hidden}
  .pbar-fill{height:100%;background:var(--gold);border-radius:6px;transition:width .6s}
  .body{padding:22px 24px 40px}
  .sec-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
  .ctabs{display:flex;gap:4px;padding:0 14px;background:#fff;border-bottom:1px solid #eceef3;position:sticky;top:0;z-index:5;overflow-x:auto}
  .ctab{flex:0 0 auto;background:none;border:none;padding:12px 14px;font-size:13px;font-weight:600;color:#8a90a2;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap}
  .ctab.on{color:#5b3df5;border-bottom-color:#5b3df5}
  .ctab-n{display:inline-block;min-width:18px;padding:0 5px;font-size:10px;font-weight:700;background:#eef0f7;color:#5b3df5;border-radius:9px;margin-left:4px}
  .ctab.on .ctab-n{background:#5b3df5;color:#fff}
  .stage{display:flex;gap:14px;padding-bottom:18px;position:relative}
  .dotcol{display:flex;flex-direction:column;align-items:center}
  .dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
       font-size:12px;color:#fff;flex-shrink:0}
  .dot.done{background:var(--done)} .dot.prog{background:var(--prog)} .dot.todo{background:var(--todo)}
  .line{width:2px;flex:1;background:var(--line);margin:3px 0}
  .line.done{background:var(--done)}
  .sbody{flex:1;padding-bottom:2px}
  .sname{font-size:15px;font-weight:600;margin-bottom:4px}
  .smeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
  .b-done{background:#e3f6ee;color:#0f6e56} .b-prog{background:#fdf3df;color:#8a5a00}
  .b-todo{background:#eef0f3;color:#5c636e}
  .b-rej{background:#fdecec;color:#c0392b} .b-hold{background:#fff4e5;color:#a15c00}
  .spct{font-size:11px;color:var(--muted)}
  .foot{text-align:center;font-size:11px;color:#aaa;padding:20px;border-top:1px solid var(--line)}
  .nf{padding:70px 24px;text-align:center}
  .nf-ico{font-size:40px;margin-bottom:12px}
  .nf-t{font-size:17px;font-weight:600;margin-bottom:6px}
  .nf-s{font-size:13px;color:var(--muted)}
  .ld{padding:80px 20px;text-align:center;color:#aaa;font-size:13px}
  .spin{width:30px;height:30px;border:3px solid #e6e8ef;border-top-color:var(--navy);
        border-radius:50%;animation:sp 0.8s linear infinite;margin:0 auto 14px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="ld"><div class="spin"></div>Loading your project status…</div>
</div>

<script>
const TOKEN = new URLSearchParams(location.search).get("t");
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function notFound(msg){
  return `<div class="nf"><div class="nf-ico">🔍</div>
    <div class="nf-t">Project status unavailable</div>
    <div class="nf-s">${esc(msg||"This link may be invalid or has expired.")}</div></div>`;
}
function statusMeta(s){
  if(s==="Done")        return {dot:"done",badge:"b-done",label:"Done",icon:"✓"};
  if(s==="In progress") return {dot:"prog",badge:"b-prog",label:"In progress",icon:"●"};
  return {dot:"todo",badge:"b-todo",label:"Not started",icon:""};
}
let CLIENT_DATA = null, CLIENT_TAB = "stages";
function setClientTab(t){ CLIENT_TAB = t; render(CLIENT_DATA); }

function render(d){
  CLIENT_DATA = d;
  const stages = d.stages || [];
  const scopeItems = d.scopeItems || [];
  const apStages = d.approvalStages || [];
  const docs = d.documents || [];
  const pct = d.percent || 0;

  let h = `<div class="hdr">
    <div class="brand">Winner Holistic Consultants</div>
    <div class="ptitle">${esc(d.title||"Project")}</div>
    ${d.client?`<div class="pclient">${esc(d.client)}</div>`:""}
    <div class="pbar-row"><span>Overall progress</span><span>${pct}% complete</span></div>
    <div class="pbar-bg"><div class="pbar-fill" style="width:${pct}%"></div></div>
  </div>`;

  // Tab bar
  const tab = (id, label, count) => `<button class="ctab ${CLIENT_TAB===id?"on":""}" onclick="setClientTab('${id}')">${label}${count!=null?` <span class="ctab-n">${count}</span>`:""}</button>`;
  h += `<div class="ctabs">
    ${tab("stages","Stages & Milestones", stages.length||null)}
    ${tab("approval","Approval", apStages.length||null)}
    ${tab("docs","Documents", docs.length||null)}
  </div>`;

  h += `<div class="body">`;

  // ── Tab: Stages & Milestones (scope + progress) ──
  if (CLIENT_TAB === "stages") {
    h += `<div class="sec-title">Scope of work</div>`;
    if (scopeItems.length) {
      h += `<div style="margin-bottom:6px">`;
      scopeItems.forEach(nm => {
        h += `<div style="font-size:13px;color:#333;padding:4px 0;display:flex;gap:8px"><span style="color:#5b3df5">•</span><span>${esc(nm)}</span></div>`;
      });
      h += `</div>`;
    } else {
      h += `<div style="color:#aaa;font-size:13px;padding:6px 0">Scope will appear here once published.</div>`;
    }
    h += `<div class="sec-title" style="margin-top:20px">Progress — status</div>`;
    if(!stages.length){
      h += `<div style="color:#aaa;font-size:13px;padding:10px 0">No progress milestones have been published yet.</div>`;
    } else {
      stages.forEach((st,i)=>{
        const m = statusMeta(st.status);
        const last = i===stages.length-1;
        h += `<div class="stage">
          <div class="dotcol"><div class="dot ${m.dot}">${m.icon}</div>${!last?`<div class="line ${st.status==="Done"?"done":""}"></div>`:""}</div>
          <div class="sbody"><div class="sname">${esc(st.name)}</div>
            <div class="smeta"><span class="badge ${m.badge}">${m.label}</span>${st.pct?`<span class="spct">${st.pct}% of project</span>`:""}</div>
          </div>
        </div>`;
      });
    }
  }

  // ── Tab: Approval ──
  else if (CLIENT_TAB === "approval") {
    h += `<div class="sec-title">Approval stages${d.approvalPercent!=null?` — ${d.approvalPercent}% approved`:""}</div>`;
    if (!apStages.length) {
      h += `<div style="color:#aaa;font-size:13px;padding:10px 0">No approval stages have been published yet.</div>`;
    } else {
      apStages.forEach((st,i)=>{
        const uiStatus = st.status==="Approved" ? "Done"
          : st.status==="Pending" ? "Not started"
          : "In progress";
        const m = statusMeta(uiStatus);
        const last = i===apStages.length-1;
        const chipColor = st.status==="Rejected" ? "b-rej" : st.status==="On hold" ? "b-hold" : m.badge;
        h += `<div class="stage">
          <div class="dotcol"><div class="dot ${m.dot}">${m.icon}</div>${!last?`<div class="line ${st.status==="Approved"?"done":""}"></div>`:""}</div>
          <div class="sbody"><div class="sname">${esc(st.name)}</div>
            <div class="smeta"><span class="badge ${chipColor}">${esc(st.status)}</span></div>
          </div>
        </div>`;
      });
    }
  }

  // ── Tab: Documents ──
  else if (CLIENT_TAB === "docs") {
    h += `<div class="sec-title">Documents</div>`;
    if (!docs.length) {
      h += `<div style="color:#aaa;font-size:13px;padding:10px 0">No documents have been shared yet.</div>`;
    } else {
      docs.forEach(doc => {
        h += `<div class="stage"><div class="sbody">
          <a href="${esc(doc.url)}" target="_blank" rel="noopener" style="color:#1a5fb4;font-size:14px;text-decoration:none">📄 ${esc(doc.name||"Document")}</a>
        </div></div>`;
      });
    }
  }

  h += `</div><div class="foot">Winner Holistic Consultants · Live project status</div>`;
  document.getElementById("app").innerHTML = h;
}
async function boot(){
  if(!TOKEN){ document.getElementById("app").innerHTML = notFound("No project link provided."); return; }
  try{
    const res = await fetch("/api/client-view.php?t=" + encodeURIComponent(TOKEN), { cache:"no-store" });
    const data = await res.json();
    if(!res.ok || !data.ok){ document.getElementById("app").innerHTML = notFound(data && data.error); return; }
    render(data);
  }catch(e){
    document.getElementById("app").innerHTML = notFound("Unable to load right now. Please try again later.");
  }
}
boot();
</script>
</body>
</html>
